<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Marsela - Wisuda</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }

        :root {
            --dark-color: #080305;
            --petal-dark: #c9184a;
            --petal-light: #ffccd5;
            --petal-mid: #ff4d6d;
            --petal-deep: #a4133c;
            --stem-color: #800f2f;
            
            --flower-scale: 1.1; 
            --btn-bottom: 8vh;
        }

        @media (min-width: 480px) { :root { --flower-scale: 1.2; --btn-bottom: 8vh; } }
        @media (min-width: 768px) { :root { --flower-scale: 1.4; --btn-bottom: 12vh; } }
        @media (min-width: 1024px) { :root { --flower-scale: 1.6; --btn-bottom: 12vh; } }

        body {
            margin: 0; padding: 0;
            min-height: 100vh; min-height: 100dvh;
            background-color: var(--dark-color);
            overflow-x: hidden; overflow-y: auto;
            perspective: 1000px;
            font-family: 'Inter', sans-serif;
            touch-action: pan-y; /* Mengizinkan scroll vertikal tapi mengunci horizontal untuk swipe */
        }

        /* ── PHASE 1 (TAMAN BUNGA & TOMBOL) ── */
        #phase-1 {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: flex-end;
            transition: opacity 1s ease;
        }

        .hero-text {
            position: absolute; top: 15vh; width: 100%; text-align: center; z-index: 5;
            opacity: 0; animation: fadeInText 3s ease 2s forwards;
        }
        .hero-text p {
            font-family: 'Playfair Display', serif; color: rgba(255, 204, 213, 0.6); 
            font-style: italic; font-size: 1.3rem; letter-spacing: 0.15em;
        }
        @keyframes fadeInText { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .action-container {
            position: absolute; bottom: var(--btn-bottom); left: 0; width: 100%;
            z-index: 20; display: flex; justify-content: center; align-items: center;
            animation: fadeInBtn 2s 4.5s backwards; transition: opacity 0.5s ease;
        }

        .btn-lanjut {
            background: rgba(201, 24, 74, 0.25); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 179, 198, 0.5); color: #ffccd5;
            padding: clamp(12px, 2vh, 16px) clamp(32px, 5vw, 48px);
            border-radius: 50px; font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 2.5vw, 1.2rem); font-style: italic; cursor: pointer; letter-spacing: 0.1em;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255, 179, 198, 0.2); transition: all 0.4s ease;
        }
        .btn-lanjut:hover {
            background: rgba(255, 77, 109, 0.4); border-color: #fff; color: #fff;
            transform: translateY(-5px) scale(1.02); box-shadow: 0 8px 30px rgba(255, 77, 109, 0.6);
        }
        @keyframes fadeInBtn { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        .flowers { 
            position: absolute; bottom: 12vh; left: 50%;
            transform: translateX(-50%) scale(var(--flower-scale)); transform-origin: bottom center;
        }

        .flower { 
            position: absolute; bottom: 2vmin; left: 50%; transform-origin: bottom center; z-index: 10; 
            --base-rot: 0deg; --base-scale: 1; --base-y: 0vmin;
            transform: translateX(-50%) translateY(var(--base-y)) rotate(var(--base-rot)) scale(var(--base-scale));
            animation: bouquet-sway var(--fl-speed, 4s) ease-in-out infinite;
        }

        .flower--1 { --base-rot: 0deg;   --base-scale: 1.1;  --base-y: 0vmin;   z-index: 2; --fl-speed: 4s; }
        .flower--2 { --base-rot: 14deg;  --base-scale: 1;    --base-y: 0vmin;   z-index: 3; --fl-speed: 4.2s; }
        .flower--3 { --base-rot: -14deg; --base-scale: 1;    --base-y: 0vmin;   z-index: 3; --fl-speed: 4.1s; }
        .flower--4 { --base-rot: 26deg;  --base-scale: 0.9;  --base-y: 1vmin;   z-index: 4; --fl-speed: 4.5s; }
        .flower--5 { --base-rot: -26deg; --base-scale: 0.9;  --base-y: 1vmin;   z-index: 4; --fl-speed: 4.4s; }
        .flower--6 { --base-rot: 38deg;  --base-scale: 0.8;  --base-y: 2vmin;   z-index: 5; --fl-speed: 4.6s; }
        .flower--7 { --base-rot: -38deg; --base-scale: 0.8;  --base-y: 2vmin;   z-index: 5; --fl-speed: 4.3s; }
        .flower--8 { --base-rot: 7deg;   --base-scale: 0.95; --base-y: 3vmin;   z-index: 6; --fl-speed: 3.8s; } 
        .flower--9 { --base-rot: -18deg; --base-scale: 0.85; --base-y: 3vmin;   z-index: 6; --fl-speed: 4.7s; }
        .flower--10{ --base-rot: 18deg;  --base-scale: 0.85; --base-y: 3vmin;   z-index: 6; --fl-speed: 4.8s; }

        .flower--1 .flower__line { height: 60vmin; animation-delay: 0.3s; }
        .flower--2 .flower__line { height: 58vmin; animation-delay: 0.6s; }
        .flower--3 .flower__line { height: 58vmin; animation-delay: 0.9s; }
        .flower--4 .flower__line { height: 52vmin; animation-delay: 1.2s; }
        .flower--5 .flower__line { height: 52vmin; animation-delay: 1.4s; }
        .flower--6 .flower__line { height: 46vmin; animation-delay: 1.6s; }
        .flower--7 .flower__line { height: 46vmin; animation-delay: 1.8s; }
        .flower--8 .flower__line { height: 42vmin; animation-delay: 2.0s; }
        .flower--9 .flower__line { height: 40vmin; animation-delay: 0.5s; }
        .flower--10 .flower__line{ height: 40vmin; animation-delay: 0.7s; }

        .flower__leafs { position: relative; z-index: 2; animation: blooming-flower 2s backwards; }
        .flower--1 .flower__leafs { animation-delay: 1.1s; }
        .flower--2 .flower__leafs { animation-delay: 1.4s; }
        .flower--3 .flower__leafs { animation-delay: 1.7s; }
        .flower--4 .flower__leafs { animation-delay: 2.0s; }
        .flower--5 .flower__leafs { animation-delay: 2.2s; }
        .flower--6 .flower__leafs { animation-delay: 2.4s; }
        .flower--7 .flower__leafs { animation-delay: 2.6s; }
        .flower--8 .flower__leafs { animation-delay: 2.8s; }
        .flower--9 .flower__leafs { animation-delay: 1.3s; }
        .flower--10 .flower__leafs{ animation-delay: 1.5s; }

        .flower__leafs::after { 
            content: ""; position: absolute; left: 0; top: 0; transform: translate(-50%, -100%); 
            width: 8vmin; height: 8vmin; background-color: var(--petal-mid); filter: blur(10vmin); 
            animation: magic-pulse 3s ease-in-out infinite alternate;
        }
        @keyframes magic-pulse {
            0% { filter: blur(8vmin); transform: translate(-50%, -100%) scale(0.8); opacity: 0.6; }
            100% { filter: blur(12vmin); transform: translate(-50%, -100%) scale(1.3); opacity: 1; box-shadow: 0 0 40px var(--petal-light); }
        }

        .flower__leaf {
            position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin;
            border-radius: 51% 49% 47% 53%/44% 45% 55% 69%;
            background-color: var(--petal-mid); background-image: linear-gradient(to top, var(--petal-dark), var(--petal-light));
            transform-origin: bottom center; opacity: 0.9; box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5);
        }
        .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 { transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg); background-image: linear-gradient(to top, var(--petal-deep), var(--petal-light)); z-index: 1; opacity: 0.8; }
        
        .flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background-color: #fff; }
        .flower__white-circle::after { content: ""; position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: inherit; background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), linear-gradient(90deg, #ffb3c6, #ff758f); }
        
        .flower__line { 
            width: 1.5vmin; margin-left: -0.75vmin; position: relative; z-index: 1; 
            background-image: linear-gradient(to top, transparent 10%, var(--stem-color), var(--petal-dark)); 
            box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5); transform-origin: bottom center; animation: grow-flower-tree 4s backwards; 
        }

        .flower--2 .flower__line, .flower--4 .flower__line, .flower--6 .flower__line, .flower--8 .flower__line, .flower--10 .flower__line { width: 6vmin; margin-left: -3vmin; background-image: none; box-shadow: none; border-right: 1.5vmin solid var(--stem-color); border-radius: 50%; }
        .flower--3 .flower__line, .flower--5 .flower__line, .flower--7 .flower__line, .flower--9 .flower__line { width: 6vmin; margin-left: -3vmin; background-image: none; box-shadow: none; border-left: 1.5vmin solid var(--stem-color); border-radius: 50%; }

        .flower__line__leaf { 
            --w: 7vmin; --h: calc(var(--w) + 2vmin); position: absolute; top: 20%; width: var(--w); height: var(--h); 
            border-top-right-radius: var(--h); border-bottom-left-radius: var(--h); background-image: linear-gradient(to top, rgba(128, 15, 47, 0.4), var(--petal-dark)); 
            transform-origin: left center; animation: swayLeaf 2.4s ease-in-out infinite; animation-delay: inherit;
        }
        .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); animation-delay: 0.2s; }
        .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); animation-delay: 0.2s; }
        .flower__line__leaf--3 { border-top-right-radius: 0; border-bottom-left-radius: 0; border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); top: 12%; transform: rotate(-70deg) rotateY(30deg); transform-origin: right center; animation-delay: 0.4s; }
        .flower__line__leaf--4 { border-top-right-radius: 0; border-bottom-left-radius: 0; border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); top: 40%; transform: rotate(-70deg) rotateY(30deg); transform-origin: right center; animation-delay: 0.4s; }

        .flower--1 .flower__line__leaf--1, .flower--1 .flower__line__leaf--2, .flower--2 .flower__line__leaf--1, .flower--4 .flower__line__leaf--1, .flower--6 .flower__line__leaf--1, .flower--8 .flower__line__leaf--1, .flower--10 .flower__line__leaf--1, .flower--2 .flower__line__leaf--2, .flower--4 .flower__line__leaf--2, .flower--6 .flower__line__leaf--2, .flower--8 .flower__line__leaf--2, .flower--10 .flower__line__leaf--2 { left: 100%; }
        .flower--1 .flower__line__leaf--3, .flower--1 .flower__line__leaf--4, .flower--2 .flower__line__leaf--3, .flower--4 .flower__line__leaf--3, .flower--6 .flower__line__leaf--3, .flower--8 .flower__line__leaf--3, .flower--10 .flower__line__leaf--3, .flower--2 .flower__line__leaf--4, .flower--4 .flower__line__leaf--4, .flower--6 .flower__line__leaf--4, .flower--8 .flower__line__leaf--4, .flower--10 .flower__line__leaf--4 { right: 0%; left: auto; }
        .flower--3 .flower__line__leaf--1, .flower--5 .flower__line__leaf--1, .flower--7 .flower__line__leaf--1, .flower--9 .flower__line__leaf--1, .flower--3 .flower__line__leaf--2, .flower--5 .flower__line__leaf--2, .flower--7 .flower__line__leaf--2, .flower--9 .flower__line__leaf--2 { left: 0%; }
        .flower--3 .flower__line__leaf--3, .flower--5 .flower__line__leaf--3, .flower--7 .flower__line__leaf--3, .flower--9 .flower__line__leaf--3, .flower--3 .flower__line__leaf--4, .flower--5 .flower__line__leaf--4, .flower--7 .flower__line__leaf--4, .flower--9 .flower__line__leaf--4 { right: 100%; left: auto; }
        
        .flower__light { position: absolute; bottom: 0vmin; width: 1vmin; height: 1vmin; background-color: #fffb00; border-radius: 50%; filter: blur(0.2vmin); animation: light-ans 4s linear infinite backwards; }
        .flower__light:nth-child(odd) { background-color: var(--petal-light); }
        .flower__light--1 { left: -2vmin; animation-delay: 1s; }
        .flower__light--2 { left: 3vmin; animation-delay: 0.5s; }
        .flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
        .flower__light--4 { left: 6vmin; animation-delay: 0.9s; }
        
        .flower__grass { --c: var(--petal-dark); --line-w: 1.5vmin; position: absolute; bottom: 12vmin; left: -7vmin; display: flex; flex-direction: column; align-items: flex-end; z-index: 7; transform-origin: bottom center; transform: rotate(-48deg) rotateY(40deg); }
        .flower__grass--1 { animation: moving-grass 2s linear infinite; }
        .flower__grass--2 { left: 2vmin; bottom: 10vmin; transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); opacity: 0.8; z-index: 1; animation: moving-grass--2 1.5s linear infinite; }
        .flower__grass--top { width: 7vmin; height: 10vmin; border-top-right-radius: 100%; border-right: var(--line-w) solid var(--c); transform-origin: bottom center; transform: rotate(-2deg); }
        .flower__grass--bottom { margin-top: -2px; width: var(--line-w); height: 25vmin; background-image: linear-gradient(to top, transparent, var(--c)); }
        .flower__grass__leaf { --size: 10vmin; position: absolute; width: calc(var(--size) * 2.1); height: var(--size); border-top-left-radius: var(--size); border-top-right-radius: var(--size); background-image: linear-gradient(to top, transparent, transparent 30%, var(--c)); z-index: 100; }
        .flower__grass__leaf--1 { top: -6%; left: 30%; --size: 6vmin; transform: rotate(-20deg); animation: growing-grass-ans--1 2s 2.6s backwards; }
        .flower__grass__leaf--2 { top: -5%; left: -110%; --size: 6vmin; transform: rotate(10deg); animation: growing-grass-ans--2 2s 2.4s linear backwards; }
        .flower__grass__leaf--3 { top: 5%; left: 60%; --size: 8vmin; transform: rotate(-18deg) rotateX(-20deg) scale(0); animation: growing-grass-ans--3 2s 2.2s linear backwards; }
        .flower__grass__leaf--4 { top: 6%; left: -135%; --size: 8vmin; transform: rotate(2deg) scale(0); animation: growing-grass-ans--4 2s 2s linear backwards; }
        .flower__grass__overlay { position: absolute; top: -10%; right: 0%; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); filter: blur(1.5vmin); z-index: 100; }

        @keyframes growing-grass-ans--3 { 0% { transform-origin: bottom left; transform: rotate(-18deg) rotateX(-20deg) scale(0); } 100% { transform: rotate(-18deg) rotateX(-20deg) scale(1); } }
        @keyframes growing-grass-ans--4 { 0% { transform-origin: bottom right; transform: rotate(2deg) scale(0); } 100% { transform: rotate(2deg) scale(1); } }

        @keyframes grow-flower-tree { 0% { height: 0; border-radius: 1vmin; } }
        @keyframes blooming-flower { 0% { transform: scale(0); } }
        @keyframes moving-grass { 0%, 100% { transform: rotate(-48deg) rotateY(40deg); } 50% { transform: rotate(-50deg) rotateY(40deg); } }
        @keyframes moving-grass--2 { 0%, 100% { transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); } 50% { transform: scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg); } }
        .growing-grass { animation: growing-grass-ans 1s 2s backwards; }
        @keyframes growing-grass-ans { 0% { transform: scale(0); } }
        .not-loaded * { animation-play-state: paused !important; }

        /* ── PHASE 2 (SURAT AFIRMASI & COVER FLOW CAROUSEL) ── */
        #phase-2 {
            position: relative; width: 100%; min-height: 100vh; min-height: 100dvh; z-index: 100;
            display: none; flex-direction: column; justify-content: flex-start; align-items: center;
            opacity: 0; padding: clamp(20px, 4vw, 50px) 0; transition: opacity 1.2s ease;
        }
        #phase-2.active { display: flex; opacity: 1; }

        .letter-card {
            background: rgba(20, 5, 10, 0.55); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 179, 198, 0.15); padding: clamp(24px, 5vw, 40px); border-radius: 24px;
            max-width: 600px; width: calc(100% - 32px); color: #ffccd5; text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); transform: translateY(20px); transition: transform 1s ease;
            margin-bottom: 25px; z-index: 200;
        }
        #phase-2.active .letter-card { transform: translateY(0); }

        .letter-title {
            font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 2.3rem); font-style: italic; color: var(--petal-mid);
            margin-bottom: 20px; border-bottom: 1px solid rgba(255, 77, 109, 0.25); padding-bottom: 10px;
        }

        .typewriter-text { font-size: clamp(1rem, 2.5vw, 1.05rem); line-height: 1.8; color: #e2e8f0; font-weight: 300; min-height: 100px; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background-color: var(--petal-mid); vertical-align: middle; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ── INTERACTIVE COVER FLOW CAROUSEL SYSTEM ── */
        .carousel-wrapper {
            position: relative;
            width: 100%; max-width: 800px; height: 350px; 
            overflow: hidden; touch-action: pan-y; z-index: 10;
        }
        
        .carousel-track {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .carousel-item {
            position: absolute; 
            width: 55%; max-width: 250px; 
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity, filter;
            pointer-events: none; /* Cegah interaksi di foto pinggir */
            user-select: none;
        }

        .polaroid-frame {
            background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); padding: 10px 10px 32px 10px;
            border-radius: 12px; box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            pointer-events: auto; /* Aktifkan event sentuhan di frame */
        }

        .polaroid-image-wrapper {
            width: 100%; aspect-ratio: 4 / 5; overflow: hidden; border-radius: 6px; background: #140b0e;
        }
        .polaroid-image-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            pointer-events: none; /* Mencegah default drag gambar browser */
        }

        /* ── Swipe Hint ── */
        .swipe-hint {
            text-align: center; color: rgba(255, 204, 213, 0.6);
            font-size: 0.85rem; letter-spacing: 0.1em;
            margin-top: 15px; font-style: italic; z-index: 5;
            animation: pulse-hint 2s infinite;
        }
        @keyframes pulse-hint { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ── NEW: FLOATING REMINDER TEXT CONTAINER (ABOVE PHOTOS) ── */
        .photo-reminder-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: rgba(255, 204, 213, 0.85); /* Slightly muted light pink */
            font-size: clamp(1.1rem, 3vw, 1.3rem); /* Responsive size */
            text-align: center;
            width: calc(100% - 32px);
            max-width: 600px;
            margin-bottom: 20px; /* Space between text and photos */
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.8s, transform 1s ease 0.8s; /* Delayed fade in */
            line-height: 1.4;
            z-index: 5;
        }

        #phase-2.active .photo-reminder-text {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>

            <div class="flower flower--5"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--6"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--7"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--8"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--9"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--10"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="growing-grass"><div class="flower__grass flower__grass--1"><div class="flower__grass--top"></div><div class="flower__grass--bottom"></div><div class="flower__grass__leaf flower__grass__leaf--1"></div><div class="flower__grass__leaf flower__grass__leaf--2"></div><div class="flower__grass__leaf flower__grass__leaf--3"></div><div class="flower__grass__leaf flower__grass__leaf--4"></div><div class="flower__grass__overlay"></div></div></div>
            <div class="growing-grass"><div class="flower__grass flower__grass--2"><div class="flower__grass--top"></div><div class="flower__grass--bottom"></div><div class="flower__grass__leaf flower__grass__leaf--1"></div><div class="flower__grass__leaf flower__grass__leaf--2"></div><div class="flower__grass__leaf flower__grass__leaf--3"></div><div class="flower__grass__leaf flower__grass__leaf--4"></div><div class="flower__grass__overlay"></div></div></div>
        </div>
        <div class="action-container" id="action-btn-wrapper">
            <button id="btn-lanjut" class="btn-lanjut">Lihat Pesan</button>
        </div>
    </div>

    <div id="phase-2">
        <div class="letter-card">
            <h1 class="letter-title">Selamat ya cantik...</h1>
            <div class="typewriter-text">
                <span id="text-container"></span><span class="cursor"></span>
            </div>
        </div>

        <div class="photo-reminder-text">
            A little reminder of how an amazing person you are
        </div>

        <div class="carousel-wrapper" id="carousel-wrapper">
            <div class="carousel-track" id="carousel-track">
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel1.jpeg" alt="Acel 1"></div></div></div>
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel2.jpeg" alt="Acel 2"></div></div></div>
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel3.jpeg" alt="Acel 3"></div></div></div>
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel4.jpeg" alt="Acel 4"></div></div></div>
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel5.jpeg" alt="Acel 5"></div></div></div>
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel6.jpeg" alt="Acel 6"></div></div></div>
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel7.jpeg" alt="Acel 7"></div></div></div>
                <div class="carousel-item"><div class="polaroid-frame"><div class="polaroid-image-wrapper"><img src="acel8.jpeg" alt="Acel 8"></div></div></div>
            </div>
        </div>
        <div class="swipe-hint">&lt;  A glimpse into your grace &gt;</div>
    </div>

    <script>
        onload = () => {
            const c = setTimeout(() => {
                document.body.classList.remove("not-loaded");
                clearTimeout(c);
            }, 1000);
        };

const pesanAfirmasi = "Selamat wisuda, Marsela. Masih nggak nyangka akhirnya bisa liat kamu berdiri di titik ini. Aku tau perjuanganmu sejauh ini nggak gampang, tapi kamu berhasil ngelewatin semuanya dengan keren banget. Jangan lupa buat istirahat dan bangga sama diri sendiri setelah semua lelah yang kamu tempuh. Apapun rintangan di depan nanti, aku yakin kamu pasti bisa handle itu semua. Tuhan Yesus selalu jaga dan berkati langkahmu. Keep being amazing, take care.";
        
        let indexHuruf = 0;
        const kecepatanKetik = 60; 

        /* ── PARTICLE ENGINE: KELOPAK MAWAR JATUH ── */
        const nightSky = document.querySelector('.night');
        const totalPetals = 25; // Jumlah kelopak di layar

        for (let i = 0; i < totalPetals; i++) {
            let petal = document.createElement('div');
            petal.classList.add('falling-petal');
            
            // Randomisasi posisi Horizontal (Kiri ke Kanan)
            petal.style.left = Math.random() * 100 + 'vw';
            
            // Randomisasi kecepatan jatuh (antara 6 hingga 12 detik)
            petal.style.animationDuration = (Math.random() * 6 + 6) + 's';
            
            // Randomisasi delay agar tidak jatuh serentak (0 hingga 10 detik)
            petal.style.animationDelay = (Math.random() * 10) + 's';
            
            nightSky.appendChild(petal);
        }

        function ketikSurat() {
            if (indexHuruf < pesanAfirmasi.length) {
                document.getElementById("text-container").innerHTML += pesanAfirmasi.charAt(indexHuruf);
                indexHuruf++;
                setTimeout(ketikSurat, kecepatanKetik);
            } else {
                document.querySelector('.cursor').style.display = 'none';
            }
        }

        /* ── COVER FLOW CAROUSEL ENGINE ── */
        const track = document.getElementById('carousel-track');
        const items = Array.from(track.children);
        const totalItems = items.length;
        
        let currentIndex = 0;
        let autoplayTimer = null;

        function updateCarousel() {
            items.forEach((item, i) => {
                // Algoritma Matrix Cincin (Infinite Loop)
                let diff = (i - currentIndex + totalItems) % totalItems;
                if (diff > Math.floor(totalItems / 2)) {
                    diff -= totalItems;
                }

                // Pengkondisian 3D Curve
                if (diff === 0) {
                    // Center (Active)
                    item.style.transform = 'translateX(0) translateY(0) scale(1) rotate(0deg)';
                    item.style.zIndex = 10;
                    item.style.opacity = 1;
                    item.style.filter = 'blur(0px) saturate(1)';
                } else if (diff === 1) {
                    // Kanan
                    item.style.transform = 'translateX(65%) translateY(15px) scale(0.8) rotate(8deg)';
                    item.style.zIndex = 5;
                    item.style.opacity = 0.6;
                    item.style.filter = 'blur(2px) saturate(0.8)';
                } else if (diff === -1) {
                    // Kiri
                    item.style.transform = 'translateX(-65%) translateY(15px) scale(0.8) rotate(-8deg)';
                    item.style.zIndex = 5;
                    item.style.opacity = 0.6;
                    item.style.filter = 'blur(2px) saturate(0.8)';
                } else {
                    // Sembunyikan yang di belakang
                    item.style.transform = `translateX(${diff > 0 ? 100 : -100}%) translateY(40px) scale(0.6) rotate(${diff * 15}deg)`;
                    item.style.zIndex = 1;
                    item.style.opacity = 0;
                    item.style.filter = 'blur(4px)';
                }
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalItems;
            updateCarousel();
            resetAutoplay();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalItems) % totalItems;
            updateCarousel();
            resetAutoplay();
        }

        function startAutoplay() {
            if(autoplayTimer) clearInterval(autoplayTimer);
            autoplayTimer = setInterval(nextSlide, 3500);
        }

        function resetAutoplay() {
            if(autoplayTimer) clearInterval(autoplayTimer);
            startAutoplay();
        }

        /* ── SWIPE LOGIC ENGINE ── */
        let startX = 0;
        let isDragging = false;
        const wrapper = document.getElementById('carousel-wrapper');

        // Touch Events (HP)
        wrapper.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isDragging = true;
            if(autoplayTimer) clearInterval(autoplayTimer); // Pause saat disentuh
        }, { passive: true });

        wrapper.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            let endX = e.changedTouches[0].clientX;
            let diffX = startX - endX;

            if (diffX > 40) { // Swipe Kiri -> Next
                nextSlide();
            } else if (diffX < -40) { // Swipe Kanan -> Prev
                prevSlide();
            } else {
                resetAutoplay(); // Resume jika swipe tidak cukup jauh
            }
            isDragging = false;
        });

        // Mouse Events (Bisa digeser pakai klik di Laptop)
        wrapper.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            isDragging = true;
            if(autoplayTimer) clearInterval(autoplayTimer);
        });

        wrapper.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            let endX = e.clientX;
            let diffX = startX - endX;

            if (diffX > 40) { nextSlide(); } 
            else if (diffX < -40) { prevSlide(); } 
            else { resetAutoplay(); }
            isDragging = false;
        });

        wrapper.addEventListener('mouseleave', () => {
            if(isDragging) {
                isDragging = false;
                resetAutoplay();
            }
        });

        /* ── MAIN SWITCH HANDLER ── */
        document.getElementById('btn-lanjut').addEventListener('click', () => {
            const phase1 = document.getElementById('phase-1');
            phase1.style.opacity = '0';
            phase1.style.pointerEvents = 'none';

            setTimeout(() => {
                phase1.style.display = 'none';
                const phase2 = document.getElementById('phase-2');
                phase2.classList.add('active'); 
                
                // Inisialisasi Carousel 3D
                updateCarousel();
                startAutoplay();
                
                setTimeout(() => ketikSurat(), 600);
            }, 1000); 
        });
    </script>
</body>
</html>
