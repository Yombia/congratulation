<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Acel - Wisuda</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }

        :root {
            --dark-color: #080305;
            --petal-dark: #c9184a;
            --petal-light: #ffccd5;
            --petal-mid: #ff4d6d;
            --petal-deep: #a4133c;
            --stem-color: #800f2f;
            --flower-scale: 0.85; 
            --btn-bottom: 12vh;
        }

        @media (min-width: 480px) { :root { --flower-scale: 0.95; --btn-bottom: 12vh; } }
        @media (min-width: 768px) { :root { --flower-scale: 1.15; --btn-bottom: 15vh; } }
        @media (min-width: 1024px) { :root { --flower-scale: 1.35; --btn-bottom: 15vh; } }

        body {
            margin: 0; padding: 0;
            min-height: 100vh; min-height: 100dvh;
            background-color: var(--dark-color);
            overflow: hidden; perspective: 1000px;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* ── 1. GLOBAL BACKGROUND ── */
        .night {
            position: fixed; inset: 0; width: 100%; height: 100%; filter: blur(0.1vmin);
            z-index: 0; 
            background-image: radial-gradient(ellipse at top, transparent 0%, var(--dark-color)), radial-gradient(ellipse at bottom, var(--dark-color), rgba(255, 105, 180, 0.15)), repeating-linear-gradient(220deg, black 0px, black 19px, transparent 19px, transparent 22px), repeating-linear-gradient(189deg, black 0px, black 19px, transparent 19px, transparent 22px), repeating-linear-gradient(148deg, black 0px, black 19px, transparent 19px, transparent 22px), linear-gradient(90deg, #ff1e56, #f0f0f0);
        }

        /* ── 2. PHASE 1 (TAMAN BUNGA & TOMBOL) ── */
        #phase-1 {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: flex-end;
            transition: opacity 0.5s ease;
        }

        .action-container {
            position: absolute; bottom: var(--btn-bottom); left: 0; width: 100%;
            z-index: 20; display: flex; justify-content: center; align-items: center;
            animation: fadeInBtn 2s 4.5s backwards; transition: opacity 0.5s ease;
        }

        .btn-lanjut {
            background: rgba(255, 77, 109, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 179, 198, 0.4); color: #ffccd5;
            padding: clamp(12px, 2vh, 16px) clamp(32px, 5vw, 48px);
            border-radius: 50px; font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 2.5vw, 1.2rem); font-style: italic; cursor: pointer; letter-spacing: 0.1em;
            box-shadow: 0 4px 20px rgba(201, 24, 74, 0.4); transition: all 0.4s ease;
        }

        .btn-lanjut:hover {
            background: rgba(255, 77, 109, 0.3); border-color: #ffccd5; color: #fff;
            transform: translateY(-5px) scale(1.02); box-shadow: 0 8px 30px rgba(255, 77, 109, 0.6);
        }

        @keyframes fadeInBtn { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        .flowers { 
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%) scale(var(--flower-scale)); 
            transform-origin: bottom center; transition: transform 0.3s ease; 
        }

        /* STRUKTUR BUNGA TAMAN */
        .flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; --fl-speed: 0.8s; }
        .flower--1 { left: 50%; transform: translateX(-50%); animation: moving-flower-1 4s linear infinite; z-index: 12; }
        .flower--2 { left: 50%; transform: translateX(-50%) rotate(15deg) scale(0.9); animation: moving-flower-2 4.2s linear infinite; z-index: 11; }
        .flower--3 { left: 50%; transform: translateX(-50%) rotate(-15deg) scale(0.9); animation: moving-flower-3 4.1s linear infinite; z-index: 11; }
        .flower--4 { left: 50%; bottom: 6vmin; transform: translateX(-50%) rotate(32deg) scale(0.8) translateX(5vmin); animation: moving-flower-1 4.5s linear infinite; z-index: 10; }
        .flower--5 { left: 50%; bottom: 6vmin; transform: translateX(-50%) rotate(-32deg) scale(0.8) translateX(-5vmin); animation: moving-flower-2 4.4s linear infinite; z-index: 10; }
        .flower--6 { left: 50%; bottom: 3vmin; transform: translateX(-50%) rotate(5deg) scale(0.75); animation: moving-flower-3 3.8s linear infinite; z-index: 13; }
        .flower--7 { left: 50%; bottom: 4vmin; transform: translateX(-50%) rotate(-25deg) scale(0.7) translateX(-10vmin); animation: moving-flower-1 4.3s linear infinite; z-index: 14; }
        .flower--8 { left: 50%; bottom: 4vmin; transform: translateX(-50%) rotate(25deg) scale(0.7) translateX(10vmin); animation: moving-flower-2 4.6s linear infinite; z-index: 14; }
        .flower--9 { left: 50%; bottom: 14vmin; transform: translateX(-50%) rotate(-22deg) scale(0.85) translateX(-8vmin); animation: moving-flower-3 4.7s linear infinite; z-index: 8; opacity: 0.85; filter: blur(1px); }
        .flower--10{ left: 50%; bottom: 14vmin; transform: translateX(-50%) rotate(22deg) scale(0.85) translateX(8vmin); animation: moving-flower-1 4.8s linear infinite; z-index: 8; opacity: 0.85; filter: blur(1px); }

        .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
        .flower--2 .flower__line { height: 65vmin; animation-delay: 0.6s; }
        .flower--3 .flower__line { height: 65vmin; animation-delay: 0.9s; }
        .flower--4 .flower__line { height: 55vmin; animation-delay: 1.2s; }
        .flower--5 .flower__line { height: 55vmin; animation-delay: 1.4s; }
        .flower--6 .flower__line { height: 50vmin; animation-delay: 1.6s; }
        .flower--7 .flower__line { height: 45vmin; animation-delay: 1.8s; }
        .flower--8 .flower__line { height: 45vmin; animation-delay: 2.0s; }
        .flower--9 .flower__line { height: 75vmin; animation-delay: 0.5s; }
        .flower--10 .flower__line{ height: 75vmin; animation-delay: 0.7s; }

        .flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
        .flower--1 .flower__leafs { animation-delay: 1.1s; }
        .flower--2 .flower__leafs { animation-delay: 1.4s; }
        .flower--3 .flower__leafs { animation-delay: 1.7s; }
        .flower--4 .flower__leafs { animation-delay: 2.0s; }
        .flower--5 .flower__leafs { animation-delay: 2.2s; }
        .flower--6 .flower__leafs { animation-delay: 2.4s; }
        .flower--7 .flower__leafs { animation-delay: 2.6s; }
        .flower--8 .flower__leafs { animation-delay: 2.8s; }
        .flower--9 .flower__leafs { animation-delay: 1.3s; }
        .flower--10 .flower__leafs{ animation-delay: 1.5s; }

        .flower__leafs::after { 
            content: ""; position: absolute; left: 0; top: 0; transform: translate(-50%, -100%); 
            width: 8vmin; height: 8vmin; background-color: var(--petal-mid); filter: blur(10vmin); 
            animation: magic-pulse 3s ease-in-out infinite alternate;
        }
        @keyframes magic-pulse {
            0% { filter: blur(8vmin); transform: translate(-50%, -100%) scale(0.8); opacity: 0.6; }
            100% { filter: blur(12vmin); transform: translate(-50%, -100%) scale(1.3); opacity: 1; box-shadow: 0 0 40px var(--petal-light); }
        }

        .flower__leaf {
            position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin;
            border-radius: 51% 49% 47% 53%/44% 45% 55% 69%;
            background-color: var(--petal-mid); background-image: linear-gradient(to top, var(--petal-dark), var(--petal-light));
            transform-origin: bottom center; opacity: 0.9; box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5);
        }
        .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 { width: 8vmin; height: 8vmin; transform-origin: bottom left; border-radius: 4vmin 10vmin 4vmin 4vmin; transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg); background-image: linear-gradient(to top, var(--petal-deep), var(--petal-light)); z-index: 1; opacity: 0.8; }
        
        .flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background-color: #fff; }
        .flower__white-circle::after { content: ""; position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: inherit; background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), linear-gradient(90deg, #ffb3c6, #ff758f); }
        
        .flower__line { width: 1.5vmin; background-image: linear-gradient(to left, rgba(0, 0, 0, 0.2), transparent, rgba(255, 255, 255, 0.2)), linear-gradient(to top, transparent 10%, var(--stem-color), var(--petal-dark)); box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5); animation: grow-flower-tree 4s backwards; }
        .flower__line__leaf { --w: 7vmin; --h: calc(var(--w) + 2vmin); position: absolute; top: 20%; left: 90%; width: var(--w); height: var(--h); border-top-right-radius: var(--h); border-bottom-left-radius: var(--h); background-image: linear-gradient(to top, rgba(128, 15, 47, 0.4), var(--petal-dark)); }
        .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--3 { border-top-right-radius: 0; border-bottom-left-radius: 0; border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); left: -460%; top: 12%; transform: rotate(-70deg) rotateY(30deg); }
        .flower__line__leaf--4 { top: 40%; left: -460%; border-top-right-radius: 0; border-bottom-left-radius: 0; border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); transform: rotate(-70deg) rotateY(30deg); }
        
        .flower__light { position: absolute; bottom: 0vmin; width: 1vmin; height: 1vmin; background-color: #fffb00; border-radius: 50%; filter: blur(0.2vmin); animation: light-ans 4s linear infinite backwards; }
        .flower__light:nth-child(odd) { background-color: var(--petal-light); }
        .flower__light--1 { left: -2vmin; animation-delay: 1s; }
        .flower__light--2 { left: 3vmin; animation-delay: 0.5s; }
        .flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
        .flower__light--4 { left: 6vmin; animation-delay: 0.9s; }
        
        .flower__grass { --c: var(--petal-dark); --line-w: 1.5vmin; position: absolute; bottom: 12vmin; left: -7vmin; display: flex; flex-direction: column; align-items: flex-end; z-index: 20; transform-origin: bottom center; transform: rotate(-48deg) rotateY(40deg); }
        .flower__grass--1 { animation: moving-grass 2s linear infinite; }
        .flower__grass--2 { left: 2vmin; bottom: 10vmin; transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); opacity: 0.8; z-index: 0; animation: moving-grass--2 1.5s linear infinite; }
        .flower__grass--top { width: 7vmin; height: 10vmin; border-top-right-radius: 100%; border-right: var(--line-w) solid var(--c); transform-origin: bottom center; transform: rotate(-2deg); }
        .flower__grass--bottom { margin-top: -2px; width: var(--line-w); height: 25vmin; background-image: linear-gradient(to top, transparent, var(--c)); }
        .flower__grass__leaf { --size: 10vmin; position: absolute; width: calc(var(--size) * 2.1); height: var(--size); border-top-left-radius: var(--size); border-top-right-radius: var(--size); background-image: linear-gradient(to top, transparent, transparent 30%, var(--c)); z-index: 100; }
        .flower__grass__leaf--1 { top: -6%; left: 30%; --size: 6vmin; transform: rotate(-20deg); animation: growing-grass-ans--1 2s 2.6s backwards; }
        .flower__grass__leaf--2 { top: -5%; left: -110%; --size: 6vmin; transform: rotate(10deg); animation: growing-grass-ans--2 2s 2.4s linear backwards; }
        .flower__grass__leaf--3 { top: 5%; left: 60%; --size: 8vmin; transform: rotate(-18deg) rotateX(-20deg); animation: growing-grass-ans--3 2s 2.2s linear backwards; }
        .flower__grass__leaf--4 { top: 6%; left: -135%; --size: 8vmin; transform: rotate(2deg); animation: growing-grass-ans--4 2s 2s linear backwards; }
        .flower__grass__overlay { position: absolute; top: -10%; right: 0%; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); filter: blur(1.5vmin); z-index: 100; }

        @keyframes moving-flower-1 { 0%, 100% { transform: translateX(-50%) rotate(2deg); } 50% { transform: translateX(-50%) rotate(-2deg); } }
        @keyframes moving-flower-2 { 0%, 100% { transform: translateX(-50%) rotate(18deg); } 50% { transform: translateX(-50%) rotate(14deg); } }
        @keyframes moving-flower-3 { 0%, 100% { transform: translateX(-50%) rotate(-18deg); } 50% { transform: translateX(-50%) rotate(-20deg); } }
        @keyframes growing-grass-ans--1 { 0% { transform-origin: bottom left; transform: rotate(-20deg) scale(0); } }
        @keyframes growing-grass-ans--2 { 0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); } }
        @keyframes growing-grass-ans--3 { 0% { transform-origin: bottom left; transform: rotate(-18deg) rotateX(-20deg) scale(0); } }
        @keyframes growing-grass-ans--4 { 0% { transform-origin: bottom right; transform: rotate(2deg) scale(0); } }
        @keyframes light-ans { 0% { opacity: 0; transform: translateY(0vmin); } 25% { opacity: 1; transform: translateY(-5vmin) translateX(-2vmin); } 50% { opacity: 1; transform: translateY(-15vmin) translateX(2vmin); filter: blur(0.2vmin); } 75% { transform: translateY(-20vmin) translateX(-2vmin); filter: blur(0.2vmin); } 100% { transform: translateY(-30vmin); opacity: 0; filter: blur(1vmin); } }
        @keyframes blooming-leaf-right { 0% { transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(0); } }
        @keyframes blooming-leaf-left { 0% { transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(0); } }
        @keyframes grow-flower-tree { 0% { height: 0; border-radius: 1vmin; } }
        @keyframes blooming-flower { 0% { transform: scale(0); } }
        @keyframes moving-grass { 0%, 100% { transform: rotate(-48deg) rotateY(40deg); } 50% { transform: rotate(-50deg) rotateY(40deg); } }
        @keyframes moving-grass--2 { 0%, 100% { transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); } 50% { transform: scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg); } }
        .growing-grass { animation: growing-grass-ans 1s 2s backwards; }
        @keyframes growing-grass-ans { 0% { transform: scale(0); } }
        .not-loaded * { animation-play-state: paused !important; }

        /* ── 3. THE 3D PERSPECTIVE BLOOM ENGINE (Karya Seni Murni) ── */
        #hero-bloom {
            position: fixed; top: 50%; left: 50%;
            width: 0; height: 0; z-index: 500; pointer-events: none;
            /* Injeksi ruang 3D yang sangat penting */
            perspective: 800px; transform-style: preserve-3d;
            transition: opacity 1s ease;
        }

        .hero-petal {
            position: absolute; bottom: 0; left: -15vmin;
            width: 30vmin; height: 45vmin;
            /* Menggunakan rumus kelopak mawar otentik yang Anda buat */
            border-radius: 51% 49% 47% 53%/44% 45% 55% 69%;
            background-image: linear-gradient(to top, var(--petal-deep), var(--petal-light));
            transform-origin: bottom center;
            opacity: 0;
            
            /* POSISI AWAL (KUNCUP): Menghadap ke kamera (90 derajat vertikal) */
            transform: rotateZ(var(--rz)) rotateX(90deg) scale(0);
        }

        

        /* Enam arah penjuru angin */
        .hero-petal:nth-child(1) { --rz: 0deg; }
        .hero-petal:nth-child(2) { --rz: 60deg; }
        .hero-petal:nth-child(3) { --rz: 120deg; }
        .hero-petal:nth-child(4) { --rz: 180deg; }
        .hero-petal:nth-child(5) { --rz: 240deg; }
        .hero-petal:nth-child(6) { --rz: 300deg; }

        /* Inti Mawar (Putik) */
        .hero-core {
            position: absolute; top: -5vmin; left: -5vmin;
            width: 10vmin; height: 10vmin; border-radius: 50%;
            background: radial-gradient(circle, var(--petal-deep) 0%, var(--dark-color) 70%);
            opacity: 0; transform: translateZ(-10px) scale(0);
        }

        /* EKSEKUSI ANIMASI MEKAR KETIKA TRIGGERED */
        #hero-bloom.expand {
            /* Kamera Zoom in perlahan ke arah bunga */
            animation: camera-zoom 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        #hero-bloom.expand .hero-petal {
            opacity: 1;
            /* Kelopak jatuh terbuka ke belakang (-10 derajat) secara organik seperti pegas */
            transform: rotateZ(var(--rz)) rotateX(-10deg) scale(1);
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s, opacity 0.3s;
        }

        #hero-bloom.expand .hero-core {
            opacity: 1;
            /* Inti membesar untuk menjadi pelapis transisi ke halaman surat */
            transform: translateZ(50px) scale(100);
            transition: transform 1s cubic-bezier(0.5, 0, 0, 1) 0.8s, opacity 0.3s;
        }

        @keyframes camera-zoom {
            0% { transform: scale(1); }
            100% { transform: scale(4); }
        }

        /* ── 4. PHASE 2 (SURAT AFIRMASI MESIN TIK) ── */
        #phase-2 {
            position: fixed; inset: 0; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            background-color: transparent; 
            transition: opacity 1s ease; padding: 24px;
        }
        #phase-2.active { opacity: 1; pointer-events: auto; }

        .letter-card {
            background: rgba(20, 5, 10, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 179, 198, 0.2);
            padding: 40px; border-radius: 24px;
            max-width: 600px; width: 100%;
            color: #ffccd5; text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transform: translateY(30px); transition: transform 1.2s ease 0.5s;
        }
        #phase-2.active .letter-card { transform: translateY(0); }

        .letter-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; font-style: italic; color: var(--petal-mid);
            margin-bottom: 20px; border-bottom: 1px solid rgba(255, 77, 109, 0.3); padding-bottom: 10px;
        }

        .typewriter-text { font-size: 1.05rem; line-height: 1.8; color: #e2e8f0; font-weight: 300; min-height: 150px; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background-color: var(--petal-mid); vertical-align: middle; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>

            <div class="flower flower--3"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div><div class="flower__light flower__light--1"></div><div class="flower__light flower__light--2"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--4"></div></div></div>
            <div class="flower flower--4"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--5"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--6"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--7"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--8"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--9"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="flower flower--10"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>
            <div class="growing-grass"><div class="flower__grass flower__grass--1"><div class="flower__grass--top"></div><div class="flower__grass--bottom"></div><div class="flower__grass__leaf flower__grass__leaf--1"></div><div class="flower__grass__leaf flower__grass__leaf--2"></div><div class="flower__grass__leaf flower__grass__leaf--3"></div><div class="flower__grass__leaf flower__grass__leaf--4"></div><div class="flower__grass__overlay"></div></div></div>
            <div class="growing-grass"><div class="flower__grass flower__grass--2"><div class="flower__grass--top"></div><div class="flower__grass--bottom"></div><div class="flower__grass__leaf flower__grass__leaf--1"></div><div class="flower__grass__leaf flower__grass__leaf--2"></div><div class="flower__grass__leaf flower__grass__leaf--3"></div><div class="flower__grass__leaf flower__grass__leaf--4"></div><div class="flower__grass__overlay"></div></div></div>

            <button id="btn-lanjut" class="btn-lanjut">Buka Surat Acel</button>

    <div id="phase-2">
        <div class="letter-card">
            <h1 class="letter-title">Teruntuk Acel...</h1>
            <div class="typewriter-text">
                <span id="text-container"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <div class="flower-container">
      <div class="stem">
        <div class="stem-inner"></div>   <!-- ini yang akan kita lengkungkan -->
      </div>
    <!-- daun & bunga di sini -->
    </div>

    <script>
        onload = () => {
            const c = setTimeout(() => {
                document.body.classList.remove("not-loaded");
                clearTimeout(c);
            }, 1000);
        };

        const pesanAfirmasi = " Selamat atas wisudanya, Marsela. Kamu luar biasa, dan aku sangat bangga bisa melihat kamu berdiri di titik ini sekarang. Semangat terus ya untuk perjalanan barumu. Jangan lupa luangkan waktu untuk mengapresiasi dirimu sendiri atas segala lelah yang berhasil kamu lewati. Aku yakin, ini baru gerbang pembuka untuk hal-hal hebat lainnya. Tuhan Yesus memberkati langkahmu selalu, take care.";
        
        let indexHuruf = 0;
        const kecepatanKetik = 60; 

        function ketikSurat() {
            if (indexHuruf < pesanAfirmasi.length) {
                document.getElementById("text-container").innerHTML += pesanAfirmasi.charAt(indexHuruf);
                indexHuruf++;
                setTimeout(ketikSurat, kecepatanKetik);
            } else {
                document.querySelector('.cursor').style.display = 'none';
            }
        }

        document.getElementById('btn-lanjut').addEventListener('click', () => {
            
            // Putar Audio
            const audio = document.getElementById('bg-music');
            if(audio) { audio.play().catch(e => console.log("Audio play diblokir browser")); }

            // Hilangkan Tombol
            document.getElementById('action-btn-wrapper').style.opacity = '0';
            document.getElementById('action-btn-wrapper').style.pointerEvents = 'none';

            // TRIGGER 3D BLOOM ENGINE
            document.getElementById('hero-bloom').classList.add('expand');

            // Transisi ke Surat dan Memudarkan Mekar
            setTimeout(() => {
                document.getElementById('phase-1').style.display = 'none'; 
                
                // Menghilangkan bunga raksasa (Fade-out)
                document.getElementById('hero-bloom').style.opacity = '0';
                
                const phase2 = document.getElementById('phase-2');
                phase2.classList.add('active'); 

                // Mulai Ngetik
                setTimeout(() => {
                    ketikSurat();
                }, 800);

            }, 1600); // Delay disesuaikan dengan durasi animasi mekar 3D
        });
    </script>
</body>
</html>
