<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marsela</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }

        :root {
            --dark-color: #080305;
            --petal-dark: #c9184a;
            --petal-light: #ffccd5;
            --petal-mid: #ff4d6d;
            --petal-deep: #a4133c;
            --stem-color: #800f2f;
            
            --flower-scale: 1.1; 
            --btn-bottom: 8vh;
        }

        @media (min-width: 480px) { :root { --flower-scale: 1.2; --btn-bottom: 8vh; } }
        @media (min-width: 768px) { :root { --flower-scale: 1.4; --btn-bottom: 12vh; } }
        @media (min-width: 1024px) { :root { --flower-scale: 1.6; --btn-bottom: 12vh; } }

        body {
            margin: 0; padding: 0;
            min-height: 100vh; min-height: 100dvh;
            background-color: var(--dark-color);
            overflow: hidden; perspective: 1000px;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* ── GLOBAL BACKGROUND ── */
        .night {
            position: fixed; inset: 0; width: 100%; height: 100%; filter: blur(0.1vmin);
            z-index: 0; 
            background-image: radial-gradient(ellipse at top, transparent 0%, var(--dark-color)), radial-gradient(ellipse at bottom, var(--dark-color), rgba(255, 105, 180, 0.15)), repeating-linear-gradient(220deg, black 0px, black 19px, transparent 19px, transparent 22px), repeating-linear-gradient(189deg, black 0px, black 19px, transparent 19px, transparent 22px), repeating-linear-gradient(148deg, black 0px, black 19px, transparent 19px, transparent 22px), linear-gradient(90deg, #ff1e56, #f0f0f0);
        }

        /* ── PHASE 1 (TAMAN BUNGA & TOMBOL) ── */
        #phase-1 {
            position: absolute; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: flex-end;
            transition: opacity 1s ease; /* Transisi memudar yang mulus */
        }

        /* TEKS JANGKAR PENYEIMBANG LANGIT */
        .hero-text {
            position: absolute; top: 15vh; width: 100%; text-align: center; z-index: 5;
            opacity: 0; animation: fadeInText 3s ease 2s forwards;
        }
        .hero-text p {
            font-family: 'Playfair Display', serif; color: rgba(255, 204, 213, 0.6); 
            font-style: italic; font-size: 1.3rem; letter-spacing: 0.15em;
        }
        @keyframes fadeInText { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .action-container {
            position: absolute; bottom: var(--btn-bottom); left: 0; width: 100%;
            z-index: 20; display: flex; justify-content: center; align-items: center;
            animation: fadeInBtn 2s 4.5s backwards; transition: opacity 0.5s ease;
        }

        .btn-lanjut {
            background: rgba(201, 24, 74, 0.25); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 179, 198, 0.5); color: #ffccd5;
            padding: clamp(12px, 2vh, 16px) clamp(32px, 5vw, 48px);
            border-radius: 50px; font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 2.5vw, 1.2rem); font-style: italic; cursor: pointer; letter-spacing: 0.1em;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255, 179, 198, 0.2); 
            transition: all 0.4s ease;
        }

        .btn-lanjut:hover {
            background: rgba(255, 77, 109, 0.4); border-color: #fff; color: #fff;
            transform: translateY(-5px) scale(1.02); box-shadow: 0 8px 30px rgba(255, 77, 109, 0.6);
        }

        @keyframes fadeInBtn { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        /* ── KONTROL BUKET ── */
        .flowers { 
            position: absolute; bottom: 12vh; left: 50%;
            transform: translateX(-50%) scale(var(--flower-scale)); 
            transform-origin: bottom center;
        }

        .flower { 
            position: absolute; bottom: 2vmin; left: 50%; 
            transform-origin: bottom center; z-index: 10; 
            --base-rot: 0deg; --base-scale: 1; --base-y: 0vmin;
            transform: translateX(-50%) translateY(var(--base-y)) rotate(var(--base-rot)) scale(var(--base-scale));
            animation: bouquet-sway var(--fl-speed, 4s) ease-in-out infinite;
        }

        /* ── FORMASI Z-INDEX BUKET ── */
        .flower--1 { --base-rot: 0deg;   --base-scale: 1.1;  --base-y: 0vmin;   z-index: 2; --fl-speed: 4s; }
        .flower--2 { --base-rot: 14deg;  --base-scale: 1;    --base-y: 0vmin;   z-index: 3; --fl-speed: 4.2s; }
        .flower--3 { --base-rot: -14deg; --base-scale: 1;    --base-y: 0vmin;   z-index: 3; --fl-speed: 4.1s; }
        .flower--4 { --base-rot: 26deg;  --base-scale: 0.9;  --base-y: 1vmin;   z-index: 4; --fl-speed: 4.5s; }
        .flower--5 { --base-rot: -26deg; --base-scale: 0.9;  --base-y: 1vmin;   z-index: 4; --fl-speed: 4.4s; }
        .flower--6 { --base-rot: 38deg;  --base-scale: 0.8;  --base-y: 2vmin;   z-index: 5; --fl-speed: 4.6s; }
        .flower--7 { --base-rot: -38deg; --base-scale: 0.8;  --base-y: 2vmin;   z-index: 5; --fl-speed: 4.3s; }
        .flower--8 { --base-rot: 7deg;   --base-scale: 0.95; --base-y: 3vmin;   z-index: 6; --fl-speed: 3.8s; } 
        .flower--9 { --base-rot: -18deg; --base-scale: 0.85; --base-y: 3vmin;   z-index: 6; --fl-speed: 4.7s; }
        .flower--10{ --base-rot: 18deg;  --base-scale: 0.85; --base-y: 3vmin;   z-index: 6; --fl-speed: 4.8s; }

        .flower--1 .flower__line { height: 60vmin; animation-delay: 0.3s; }
        .flower--2 .flower__line { height: 58vmin; animation-delay: 0.6s; }
        .flower--3 .flower__line { height: 58vmin; animation-delay: 0.9s; }
        .flower--4 .flower__line { height: 52vmin; animation-delay: 1.2s; }
        .flower--5 .flower__line { height: 52vmin; animation-delay: 1.4s; }
        .flower--6 .flower__line { height: 46vmin; animation-delay: 1.6s; }
        .flower--7 .flower__line { height: 46vmin; animation-delay: 1.8s; }
        .flower--8 .flower__line { height: 42vmin; animation-delay: 2.0s; }
        .flower--9 .flower__line { height: 40vmin; animation-delay: 0.5s; }
        .flower--10 .flower__line{ height: 40vmin; animation-delay: 0.7s; }

        .flower__leafs { position: relative; z-index: 2; animation: blooming-flower 2s backwards; }
        .flower--1 .flower__leafs { animation-delay: 1.1s; }
        .flower--2 .flower__leafs { animation-delay: 1.4s; }
        .flower--3 .flower__leafs { animation-delay: 1.7s; }
        .flower--4 .flower__leafs { animation-delay: 2.0s; }
        .flower--5 .flower__leafs { animation-delay: 2.2s; }
        .flower--6 .flower__leafs { animation-delay: 2.4s; }
        .flower--7 .flower__leafs { animation-delay: 2.6s; }
        .flower--8 .flower__leafs { animation-delay: 2.8s; }
        .flower--9 .flower__leafs { animation-delay: 1.3s; }
        .flower--10 .flower__leafs{ animation-delay: 1.5s; }

        .flower__leafs::after { 
            content: ""; position: absolute; left: 0; top: 0; transform: translate(-50%, -100%); 
            width: 8vmin; height: 8vmin; background-color: var(--petal-mid); filter: blur(10vmin); 
            animation: magic-pulse 3s ease-in-out infinite alternate;
        }
        @keyframes magic-pulse {
            0% { filter: blur(8vmin); transform: translate(-50%, -100%) scale(0.8); opacity: 0.6; }
            100% { filter: blur(12vmin); transform: translate(-50%, -100%) scale(1.3); opacity: 1; box-shadow: 0 0 40px var(--petal-light); }
        }

        /* ── STRUKTUR KELOPAK MAWAR (DISERAGAMKAN SEMPURNA) ── */
        .flower__leaf {
            position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin;
            border-radius: 51% 49% 47% 53%/44% 45% 55% 69%;
            background-color: var(--petal-mid); background-image: linear-gradient(to top, var(--petal-dark), var(--petal-light));
            transform-origin: bottom center; opacity: 0.9; box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5);
        }
        .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 { transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg); background-image: linear-gradient(to top, var(--petal-deep), var(--petal-light)); z-index: 1; opacity: 0.8; }
        
        .flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background-color: #fff; }
        .flower__white-circle::after { content: ""; position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: inherit; background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), linear-gradient(90deg, #ffb3c6, #ff758f); }
        
        /* ── TANGKAI MELENGKUNG ── */
        .flower__line { 
            width: 1.5vmin; margin-left: -0.75vmin;
            position: relative; z-index: 1; 
            background-image: linear-gradient(to top, transparent 10%, var(--stem-color), var(--petal-dark)); 
            box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5); 
            transform-origin: bottom center;
            animation: grow-flower-tree 4s backwards; 
        }

        .flower--2 .flower__line, .flower--4 .flower__line, .flower--6 .flower__line, .flower--8 .flower__line, .flower--10 .flower__line {
            width: 6vmin; margin-left: -3vmin; 
            background-image: none; box-shadow: none;
            border-right: 1.5vmin solid var(--stem-color);
            border-radius: 50%; 
        }

        .flower--3 .flower__line, .flower--5 .flower__line, .flower--7 .flower__line, .flower--9 .flower__line {
            width: 6vmin; margin-left: -3vmin;
            background-image: none; box-shadow: none;
            border-left: 1.5vmin solid var(--stem-color);
            border-radius: 50%;
        }

        /* ── DAUN LENTUR ── */
        .flower__line__leaf { 
            --w: 7vmin; --h: calc(var(--w) + 2vmin); 
            position: absolute; top: 20%; 
            width: var(--w); height: var(--h); 
            border-top-right-radius: var(--h); border-bottom-left-radius: var(--h); 
            background-image: linear-gradient(to top, rgba(128, 15, 47, 0.4), var(--petal-dark)); 
            transform-origin: left center;
            animation: swayLeaf 2.4s ease-in-out infinite;
            animation-delay: inherit;
        }

        .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); animation-delay: 0.2s; }
        .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); animation-delay: 0.2s; }
        .flower__line__leaf--3 { 
            border-top-right-radius: 0; border-bottom-left-radius: 0; 
            border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); 
            top: 12%; transform: rotate(-70deg) rotateY(30deg); 
            transform-origin: right center; animation-delay: 0.4s; 
        }
        .flower__line__leaf--4 { 
            border-top-right-radius: 0; border-bottom-left-radius: 0; 
            border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); 
            top: 40%; transform: rotate(-70deg) rotateY(30deg); 
            transform-origin: right center; animation-delay: 0.4s; 
        }

        .flower--1 .flower__line__leaf--1, .flower--1 .flower__line__leaf--2,
        .flower--2 .flower__line__leaf--1, .flower--4 .flower__line__leaf--1, .flower--6 .flower__line__leaf--1, .flower--8 .flower__line__leaf--1, .flower--10 .flower__line__leaf--1,
        .flower--2 .flower__line__leaf--2, .flower--4 .flower__line__leaf--2, .flower--6 .flower__line__leaf--2, .flower--8 .flower__line__leaf--2, .flower--10 .flower__line__leaf--2 {
            left: 100%; 
        }
        .flower--1 .flower__line__leaf--3, .flower--1 .flower__line__leaf--4,
        .flower--2 .flower__line__leaf--3, .flower--4 .flower__line__leaf--3, .flower--6 .flower__line__leaf--3, .flower--8 .flower__line__leaf--3, .flower--10 .flower__line__leaf--3,
        .flower--2 .flower__line__leaf--4, .flower--4 .flower__line__leaf--4, .flower--6 .flower__line__leaf--4, .flower--8 .flower__line__leaf--4, .flower--10 .flower__line__leaf--4 {
            right: 0%; left: auto;
        }

        .flower--3 .flower__line__leaf--1, .flower--5 .flower__line__leaf--1, .flower--7 .flower__line__leaf--1, .flower--9 .flower__line__leaf--1,
        .flower--3 .flower__line__leaf--2, .flower--5 .flower__line__leaf--2, .flower--7 .flower__line__leaf--2, .flower--9 .flower__line__leaf--2 {
            left: 0%;
        }
        .flower--3 .flower__line__leaf--3, .flower--5 .flower__line__leaf--3, .flower--7 .flower__line__leaf--3, .flower--9 .flower__line__leaf--3,
        .flower--3 .flower__line__leaf--4, .flower--5 .flower__line__leaf--4, .flower--7 .flower__line__leaf--4, .flower--9 .flower__line__leaf--4 {
            right: 100%; left: auto;
        }
        
        @keyframes swayLeaf {
            0%   { transform: rotate(0deg) translateY(0); }
            40%  { transform: rotate(3.5deg) translateY(-0.5vmin); }
            80%  { transform: rotate(-4.2deg) translateY(0.4vmin); }
            100% { transform: rotate(0deg) translateY(0); }
        }
        
        .flower__light { position: absolute; bottom: 0vmin; width: 1vmin; height: 1vmin; background-color: #fffb00; border-radius: 50%; filter: blur(0.2vmin); animation: light-ans 4s linear infinite backwards; }
        .flower__light:nth-child(odd) { background-color: var(--petal-light); }
        .flower__light--1 { left: -2vmin; animation-delay: 1s; }
        .flower__light--2 { left: 3vmin; animation-delay: 0.5s; }
        .flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
        .flower__light--4 { left: 6vmin; animation-delay: 0.9s; }
        
        /* RUMPUT BERDAUN */
        .flower__grass { 
            --c: var(--petal-dark); --line-w: 1.5vmin; position: absolute; bottom: 12vmin; left: -7vmin; display: flex; flex-direction: column; align-items: flex-end; 
            z-index: 7; transform-origin: bottom center; transform: rotate(-48deg) rotateY(40deg); 
        }
        .flower__grass--1 { animation: moving-grass 2s linear infinite; }
        .flower__grass--2 { left: 2vmin; bottom: 10vmin; transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); opacity: 0.8; z-index: 1; animation: moving-grass--2 1.5s linear infinite; }
        .flower__grass--top { width: 7vmin; height: 10vmin; border-top-right-radius: 100%; border-right: var(--line-w) solid var(--c); transform-origin: bottom center; transform: rotate(-2deg); }
        .flower__grass--bottom { margin-top: -2px; width: var(--line-w); height: 25vmin; background-image: linear-gradient(to top, transparent, var(--c)); }
        .flower__grass__leaf { --size: 10vmin; position: absolute; width: calc(var(--size) * 2.1); height: var(--size); border-top-left-radius: var(--size); border-top-right-radius: var(--size); background-image: linear-gradient(to top, transparent, transparent 30%, var(--c)); z-index: 100; }
        .flower__grass__leaf--1 { top: -6%; left: 30%; --size: 6vmin; transform: rotate(-20deg); animation: growing-grass-ans--1 2s 2.6s backwards; }
        .flower__grass__leaf--2 { top: -5%; left: -110%; --size: 6vmin; transform: rotate(10deg); animation: growing-grass-ans--2 2s 2.4s linear backwards; }
        .flower__grass__leaf--3 { top: 5%; left: 60%; --size: 8vmin; transform: rotate(-18deg) rotateX(-20deg); animation: growing-grass-ans--3 2s 2.2s linear backwards; }
        .flower__grass__leaf--4 { top: 6%; left: -135%; --size: 8vmin; transform: rotate(2deg); animation: growing-grass-ans--4 2s 2s linear backwards; }
        .flower__grass__overlay { position: absolute; top: -10%; right: 0%; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); filter: blur(1.5vmin); z-index: 100; }

        @keyframes bouquet-sway {
            0%, 100% { transform: translateX(-50%) translateY(var(--base-y)) rotate(calc(var(--base-rot) + 1.5deg)) scale(var(--base-scale)); }
            50%      { transform: translateX(-50%) translateY(var(--base-y)) rotate(calc(var(--base-rot) - 1.5deg)) scale(var(--base-scale)); }
        }
        @keyframes growing-grass-ans--1 { 0% { transform-origin: bottom left; transform: rotate(-20deg) scale(0); } }
        @keyframes growing-grass-ans--2 { 0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); } }
        @keyframes growing-grass-ans--3 { 0% { transform-origin: bottom left; transform: rotate(-18deg) rotateX(-20deg) scale(0); } }
        @keyframes growing-grass-ans--4 { 0% { transform-origin: bottom right; transform: rotate(2deg) scale(0); } }
        @keyframes light-ans { 0% { opacity: 0; transform: translateY(0vmin); } 25% { opacity: 1; transform: translateY(-5vmin) translateX(-2vmin); } 50% { opacity: 1; transform: translateY(-15vmin) translateX(2vmin); filter: blur(0.2vmin); } 75% { transform: translateY(-20vmin) translateX(-2vmin); filter: blur(0.2vmin); } 100% { transform: translateY(-30vmin); opacity: 0; filter: blur(1vmin); } }
        @keyframes blooming-leaf-right { 0% { transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(0); } }
        @keyframes blooming-leaf-left { 0% { transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(0); } }
        @keyframes grow-flower-tree { 0% { height: 0; border-radius: 1vmin; } }
        @keyframes blooming-flower { 0% { transform: scale(0); } }
        @keyframes moving-grass { 0%, 100% { transform: rotate(-48deg) rotateY(40deg); } 50% { transform: rotate(-50deg) rotateY(40deg); } }
        @keyframes moving-grass--2 { 0%, 100% { transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); } 50% { transform: scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg); } }
        .growing-grass { animation: growing-grass-ans 1s 2s backwards; }
        @keyframes growing-grass-ans { 0% { transform: scale(0); } }
        .not-loaded * { animation-play-state: paused !important; }

        /* ── PHASE 2 (SURAT AFIRMASI MESIN TIK) ── */
        #phase-2 {
            position: fixed; inset: 0; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            background-color: transparent; transition: opacity 1s ease; padding: 24px;
        }
        #phase-2.active { opacity: 1; pointer-events: auto; }

        .letter-card {
            background: rgba(20, 5, 10, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 179, 198, 0.2);
            padding: 40px; border-radius: 24px;
            max-width: 600px; width: 100%; color: #ffccd5; text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transform: translateY(30px); transition: transform 1.2s ease 0.5s;
        }
        #phase-2.active .letter-card { transform: translateY(0); }

        .letter-title {
            font-family: 'Playfair Display', serif; font-size: 2rem; font-style: italic; color: var(--petal-mid);
            margin-bottom: 20px; border-bottom: 1px solid rgba(255, 77, 109, 0.3); padding-bottom: 10px;
        }

        .typewriter-text { font-size: 1.05rem; line-height: 1.8; color: #e2e8f0; font-weight: 300; min-height: 150px; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background-color: var(--petal-mid); vertical-align: middle; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>

            <div class="flower flower--3"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div><div class="flower__light flower__light--1"></div><div class="flower__light flower__light--2"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--4"></div></div></div>
            <div class="flower flower--4"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"></div></div>

    <div id="phase-2">
        <div class="letter-card">
            <h1 class="letter-title">Teruntuk Marsela...</h1>
            <div class="typewriter-text">
                <span id="text-container"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        onload = () => {
            const c = setTimeout(() => {
                document.body.classList.remove("not-loaded");
                clearTimeout(c);
            }, 1000);
        };

        const pesanAfirmasi = "Selamat atas wisudanya, Marsela. Kamu luar biasa, dan aku sangat bangga bisa melihat kamu berdiri di titik ini sekarang. Semangat terus ya untuk perjalanan barumu. Jangan lupa luangkan waktu untuk mengapresiasi dirimu sendiri atas segala lelah yang berhasil kamu taklukkan. Aku yakin, ini baru gerbang pembuka untuk hal-hal hebat lainnya. Tuhan Yesus memberkati langkahmu selalu. Take care.";
        
        let indexHuruf = 0;
        const kecepatanKetik = 60; 

        function ketikSurat() {
            if (indexHuruf < pesanAfirmasi.length) {
                document.getElementById("text-container").innerHTML += pesanAfirmasi.charAt(indexHuruf);
                indexHuruf++;
                setTimeout(ketikSurat, kecepatanKetik);
            } else {
                document.querySelector('.cursor').style.display = 'none';
            }
        }

        document.getElementById('btn-lanjut').addEventListener('click', () => {

            /* ── 1. Sembunyikan Phase 1 (Fade Out Mulus) ── */
            const phase1 = document.getElementById('phase-1');
            phase1.style.opacity = '0';
            phase1.style.pointerEvents = 'none';

            /* ── 2. Tampilkan Phase 2 (Surat) ── */
            setTimeout(() => {
                phase1.style.display = 'none'; // Hapus taman dari render tree
                const phase2 = document.getElementById('phase-2');
                phase2.classList.add('active'); // Memunculkan surat dengan efek slide-up
                
                // Mulai animasi ngetik setelah surat muncul sempurna
                setTimeout(() => ketikSurat(), 800);
            }, 1000); // 1 detik jeda untuk sinkron dengan fade-out phase 1
        });
    </script>
